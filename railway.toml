# Railway deployment configuration for CaliphateMakhtaba backend
# Place this file at: backend/railway.toml

[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build && npx prisma generate"

[deploy]
startCommand = "npx prisma migrate deploy && node dist/main"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
path = "/api/auth/me"
timeout = 30
